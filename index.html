<html lang="en">
<head>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }

        .header h1 {
            font-size: 2.4em;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1em;
            max-width: 600px;
            margin: 0 auto;
        }

        .subtitle {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.85em;
            color: #a5b4fc;
            margin-top: 12px;
        }

        /* Metrics Bar */
        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .metric {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .metric:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }

        .metric-value {
            font-size: 2em;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .metric-label {
            color: #94a3b8;
            font-size: 0.85em;
        }

        /* Hub Container */
        .hub-container {
            padding: 40px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .category-section {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(99, 102, 241, 0.2);
        }

        .category-icon {
            font-size: 1.5em;
        }

        .category-title {
            font-size: 1.4em;
            font-weight: 700;
            color: #f1f5f9;
        }

        .category-count {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.85em;
            color: #a5b4fc;
            margin-left: auto;
        }

        .hub {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--card-accent, #60a5fa);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::before,
        .card.active::before {
            opacity: 1;
        }

        .card:hover,
        .card.active {
            transform: translateY(-4px);
            border-color: var(--card-accent, rgba(99, 102, 241, 0.5));
            box-shadow: 0 8px 30px var(--card-glow, rgba(99, 102, 241, 0.4));
        }

        .card-icon {
            font-size: 2em;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.15em;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #94a3b8;
            font-size: 0.85em;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .card-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .stat {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.75em;
            color: #a5b4fc;
        }

        /* Category color mappings */
        .card[data-category="prototypes"] {
            --card-accent: #e879f9;
            --card-glow: rgba(232, 121, 249, 0.4);
        }

        .card[data-category="tools"] {
            --card-accent: #60a5fa;
            --card-glow: rgba(96, 165, 250, 0.4);
        }

        .card[data-category="dashboards"] {
            --card-accent: #34d399;
            --card-glow: rgba(52, 211, 153, 0.4);
        }

        .card[data-category="pm-docs"] {
            --card-accent: #a78bfa;
            --card-glow: rgba(167, 139, 250, 0.4);
        }

        .card[data-category="skills"] {
            --card-accent: #22d3ee;
            --card-glow: rgba(34, 211, 238, 0.4);
        }

        .card[data-category="active"] {
            --card-accent: #fbbf24;
            --card-glow: rgba(251, 191, 36, 0.4);
        }

        /* Detail Panel */
        .detail-panel {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 20px;
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .detail-panel.visible {
            opacity: 1;
            max-height: 5000px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-content {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 32px;
            position: relative;
        }

        .detail-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            color: #a5b4fc;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .detail-close:hover {
            background: rgba(99, 102, 241, 0.3);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .detail-icon {
            font-size: 3em;
        }

        .detail-title {
            font-size: 1.8em;
            font-weight: 700;
            color: #f1f5f9;
        }

        .detail-body {
            color: #cbd5e1;
            line-height: 1.8;
        }

        .detail-body h3 {
            color: #f1f5f9;
            font-size: 1.2em;
            margin: 24px 0 12px;
        }

        .detail-body ul {
            margin-left: 20px;
            margin-bottom: 16px;
        }

        .detail-body li {
            margin-bottom: 8px;
        }

        .detail-body a {
            color: #60a5fa;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .detail-body a:hover {
            color: #93c5fd;
        }

        .detail-body code {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 4px;
            padding: 2px 6px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.9em;
        }

        .flow-diagram {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-size: 0.85em;
            line-height: 1.6;
        }

        .highlight {
            color: #60a5fa;
            font-weight: 600;
        }

        .accent {
            color: #a78bfa;
        }

        .warn {
            color: #fbbf24;
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(30px);
                opacity: 0;
            }
        }

        /* What's New Ticker */
        .whats-new {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .ticker-container {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            padding: 20px;
        }

        .ticker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .ticker-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #f1f5f9;
        }

        .ticker-controls {
            display: flex;
            gap: 8px;
        }

        .ticker-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 6px;
            padding: 6px 12px;
            color: #a5b4fc;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }

        .ticker-btn:hover {
            background: rgba(99, 102, 241, 0.3);
        }

        .ticker-items {
            display: grid;
            gap: 12px;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .ticker-item.visible {
            opacity: 1;
        }

        .ticker-icon {
            font-size: 1.5em;
        }

        .ticker-content {
            flex: 1;
        }

        .ticker-label {
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .ticker-desc {
            color: #94a3b8;
            font-size: 0.85em;
        }

        .ticker-date {
            color: #64748b;
            font-size: 0.75em;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 0.85em;
        }

        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }

        .footer a:hover {
            color: #93c5fd;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hub {
                grid-template-columns: 1fr;
            }

            .metrics-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .header h1 {
                font-size: 1.8em;
            }

            .category-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .category-count {
                margin-left: 0;
            }
        }
    </style>
</head>

    <!-- Floating Particles -->
    <script>
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 12 + 8) + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.width = (Math.random() * 3 + 2) + 'px';
            particle.style.height = particle.style.width;
            document.body.appendChild(particle);
        }
    </script>

                body: `

        // Ticker data
        const tickerData = [
            { color: '#60a5fa', icon: '🔧', label: 'Messaging Component Builder', date: '2026-07-10', desc: 'New skill deployed — build components conversationally' },
            { color: '#34d399', icon: '📊', label: 'VOC Dashboard', date: '2026-07-08', desc: 'Weekly refresh now includes Slack sentiment data' },
            { color: '#e879f9', icon: '📱', label: 'Facebook Templates Prototype', date: '2026-07-05', desc: 'Meta compliance prototype completed' },
            { color: '#fbbf24', icon: '🚢', label: 'FY27 Release Coordination', date: '2026-07-01', desc: 'Centralized tracking now live for all FY27 releases' },
            { color: '#a78bfa', icon: '🎬', label: 'Demo Talk Track Tool', date: '2026-06-25', desc: 'Camtasia integration added for video production' },
        ];

        let tickerPage = 0;
        let tickerInterval = null;
        const ITEMS_PER_PAGE = 5;

        // Category metadata
        const categories = [
            { id: 'active', icon: '⚡', title: 'Active Projects', color: '#fbbf24' },
            { id: 'tools', icon: '🔧', title: 'Tools & Automation', color: '#60a5fa' },
            { id: 'skills', icon: '🧠', title: 'Skills & Agents', color: '#22d3ee' },
            { id: 'dashboards', icon: '📊', title: 'Dashboards & Analytics', color: '#34d399' },
            { id: 'pm-docs', icon: '📋', title: 'PM Documentation', color: '#a78bfa' },
            { id: 'prototypes', icon: '🔬', title: 'Prototypes & Experiments', color: '#e879f9' },
        ];

        // Render cards grouped by category
        function renderCards() {
            const container = document.getElementById('hubContainer');

            categories.forEach(category => {
                const categoryProjects = projects.filter(p => p.category === category.id);
                if (categoryProjects.length === 0) return;

                // Create category section
                const section = document.createElement('div');
                section.className = 'category-section';

                // Category header
                const header = document.createElement('div');
                header.className = 'category-header';
                header.innerHTML = `
                    <div class="category-icon">${category.icon}</div>
                    <div class="category-title">${category.title}</div>
                    <div class="category-count">${categoryProjects.length}</div>
                `;
                section.appendChild(header);

                // Cards grid
                const hub = document.createElement('div');
                hub.className = 'hub';

                categoryProjects.forEach(project => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-category', project.category);
                    card.setAttribute('data-id', project.id);
                    card.onclick = () => showDetail(project.id);
                    card.innerHTML = `
                        <div class="card-icon">${project.icon}</div>
                        <div class="card-title">${project.title}</div>
                        <div class="card-desc">${project.desc}</div>
                        <div class="card-stats">
                            ${project.stats.map(stat => `<div class="stat">${stat}</div>`).join('')}
                        </div>
                    `;
                    hub.appendChild(card);
                });

                section.appendChild(hub);
                container.appendChild(section);
            });
        }

        // Show detail panel
        function showDetail(id) {
            let detail = details[id];

            // Fallback for projects without detailed content
            if (!detail) {
                const project = projects.find(p => p.id === id);
                if (!project) return;

                detail = {
                    icon: project.icon,
                    title: project.title,
                    body: `
                        <h3>Overview</h3>
                        <p>${project.desc}</p>

                        <h3>Key Capabilities</h3>
                        <ul>
                            ${project.stats.map(stat => `<li>${stat}</li>`).join('')}
                        </ul>

                        <h3>Status</h3>
                        <p>Part of the <span class="highlight">${getCategoryName(project.category)}</span> portfolio.</p>
                    `
                };
            }

            document.getElementById('detailIcon').textContent = detail.icon;
            document.getElementById('detailTitle').textContent = detail.title;
            document.getElementById('detailBody').innerHTML = detail.body;

            const panel = document.getElementById('detailPanel');
            panel.classList.add('visible');

            // Wait for panel to fully expand, then scroll
            setTimeout(() => {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);

            // Mark active card
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`.card[data-id="${id}"]`);
            if (card) card.classList.add('active');
        }

        // Helper to get category display name
        function getCategoryName(categoryId) {
            const category = categories.find(c => c.id === categoryId);
            return category ? category.title : categoryId;
        }

        // Hide detail panel
        function hideDetail() {
            document.getElementById('detailPanel').classList.remove('visible');
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        }

        // Show metric detail
        function showMetricDetail(metric) {
            const metricDetails = {
                'total': 'total-projects',
                'active': 'pm-fy27pdlc-releases',
                'prototypes': 'facebook-templates',
                'skills': 'messaging-component-builder',
            };
            if (metricDetails[metric]) {
                showDetail(metricDetails[metric]);
            }
        }

        // Ticker functions
        function renderTicker() {
            const container = document.getElementById('tickerItems');
            container.innerHTML = '';
            const start = tickerPage * ITEMS_PER_PAGE;
            const end = Math.min(start + ITEMS_PER_PAGE, tickerData.length);

            for (let i = start; i < end; i++) {
                const item = tickerData[i];
                const div = document.createElement('div');
                div.className = 'ticker-item';
                div.innerHTML = `
                    <div class="ticker-icon">${item.icon}</div>
                    <div class="ticker-content">
                        <div class="ticker-label" style="color: ${item.color}">${item.label}</div>
                        <div class="ticker-desc">${item.desc}</div>
                    </div>
                    <div class="ticker-date">${item.date}</div>
                `;
                container.appendChild(div);
                setTimeout(() => div.classList.add('visible'), 50 + i * 50);
            }
        }

        function tickerNext() {
            tickerPage = (tickerPage + 1) % Math.ceil(tickerData.length / ITEMS_PER_PAGE);
            renderTicker();
        }

        function tickerPrev() {
            tickerPage = (tickerPage - 1 + Math.ceil(tickerData.length / ITEMS_PER_PAGE)) % Math.ceil(tickerData.length / ITEMS_PER_PAGE);
            renderTicker();
        }

        function tickerToggle() {
            const btn = document.getElementById('tickerToggle');
            if (tickerInterval) {
                clearInterval(tickerInterval);
                tickerInterval = null;
                btn.textContent = 'Play';
            } else {
                tickerInterval = setInterval(tickerNext, 8000);
                btn.textContent = 'Pause';
            }
        }

        // Initialize
        renderCards();
        renderTicker();
        tickerInterval = setInterval(tickerNext, 8000);
    </script>
